<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kodetiger 딥링크 테스트</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; line-height: 2; }
        .btn { 
            display: inline-block; padding: 15px 25px; margin: 10px;
            background-color: #007AFF; color: white; 
            text-decoration: none; border-radius: 8px; font-weight: bold;
        }
        .btn:active { background-color: #0051a8; }
        .info { color: #666; font-size: 0.9em; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Deep Link Test Page</h1>
    <p>아래 버튼들을 클릭하여 앱이 자동으로 실행되는지 확인하세요.</p>

    <div>
        <a href="https://kodetiger.github.io/test" class="btn">테스트 페이지 앱으로 열기</a>
    </div>
    <div>
        <a href="https://kodetiger.github.io/product/123" class="btn">상품 상세(123) 앱으로 열기</a>
    </div>

    <div class="info">
        <p>※ 주소창에 직접 입력하면 앱이 열리지 않습니다.<br>
        반드시 위 링크를 <strong>클릭</strong>해야 합니다.</p>
    </div>
</body>
</html>
